# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
    {id = "check-merge-conflict"},
    {id = "check-yaml"},
    {id = "check-toml"},
    {id = "end-of-file-fixer"},
    {id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"]},
    {id = "check-added-large-files"},
]

[[repos]]
repo = "https://gitlab.com/bmares/check-json5"
rev = "v1.0.1"
hooks = [{id = "check-json5"}]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.10.7"
hooks = [{id = "uv-lock"}]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.4"
hooks = [
    {id = "ruff", types_or = ["python", "pyi"], args = ["--fix"]},
    {id = "ruff-format", types_or = ["python", "pyi"]},
]

[[repos]]
repo = "https://github.com/econchick/interrogate"
rev = "1.7.0"
hooks = [{id = "interrogate", pass_filenames = false}]

[[repos]]
repo = "https://github.com/rohaquinlop/complexipy-pre-commit"
rev = "v5.1.0"
hooks = [{id = "complexipy"}]

# Local hooks require UV
[[repos]]
repo = "local"
hooks = [
    {id = "tach", name = "tach", entry = "uvx tach check", language = "system", pass_filenames = false},
    {id = "ty", name = "ty", entry = "uvx ty check src", language = "system", pass_filenames = false},
]
