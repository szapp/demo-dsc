name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
            enable-cache: true

      - name: Install the project
        run: uv sync --locked --no-default-groups --dev

      - name: Lint
        run: uv run ruff check --output-format=github .

      - name: Format
        run: uv run ruff format --diff

      - name: Type checks
        run: uv run ty check src

      - name: Check modularity
        run: uv run tach check

      - name: Check docstrings in tests
        run: uv run interrogate tests

      - name: Check complexity
        run: uv run complexipy

      - name: Test
        run: uv run pytest --junitxml=junit/test-results.xml

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: junit/test-results.xml
        if: ${{ always() }}
