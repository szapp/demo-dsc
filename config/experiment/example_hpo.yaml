# @package _global_
defaults: [/.exp_hpo]

# Experiment metadata
experiment:
  name: hpo-sweep-example_${now:%Y%m%d}_${now:%H%M%S}}
  description: |
    Hyperparameter optimization over a number of **estimators** and **feature toggle** of co1.

# Experiment configuration
hydra:
  sweeper:
    direction: maximize
    n_trials: 8
    n_jobs: 8
    params:
      model.steps.regressor.n_estimators: "choice(10, 50, 100, 500)"
      model.steps.feature_selection.transformers.passthrough.columns.col1: "choice(true, false)"
